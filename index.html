<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel 部署测试 | 欢迎页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态背景装饰 */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
            pointer-events: none;
        }

        @keyframes moveGrid {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        /* 浮动粒子效果 */
        .particle {
            position: absolute;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        /* 主卡片 */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 3rem 4rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            max-width: 90%;
            width: 600px;
            animation: fadeInUp 0.8s ease-out;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 图标 */
        .icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* 标题 */
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        /* 装饰下划线 */
        .underline {
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin: 1rem auto;
            border-radius: 2px;
        }

        /* 内容文字 */
        .message {
            font-size: 1.2rem;
            color: #4a5568;
            margin: 1.5rem 0;
            line-height: 1.6;
        }

        /* 状态徽章 */
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            margin: 1rem 0;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }

        /* 信息网格 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .info-item {
            background: #f7fafc;
            padding: 1rem;
            border-radius: 1rem;
            transition: all 0.3s ease;
        }

        .info-item:hover {
            background: #edf2f7;
            transform: scale(1.05);
        }

        .info-label {
            font-size: 0.8rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .info-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3748;
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        /* 页脚 */
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #a0aec0;
        }

        /* 响应式设计 */
        @media (max-width: 640px) {
            .card {
                padding: 2rem 1.5rem;
                width: 90%;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .message {
                font-size: 1rem;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 成功状态标记 */
        .success-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        .success-icon::before {
            content: '✓';
            font-size: 2.5rem;
            color: white;
            font-weight: bold;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4);
            }
            50% {
                box-shadow: 0 0 0 20px rgba(102, 126, 234, 0);
            }
        }
    </style>
</head>
<body>
    <!-- 动态粒子效果 -->
    <div id="particles"></div>

    <div class="card">
        <div class="success-icon"></div>
        
        <h1>🎉 部署成功！</h1>
        <div class="underline"></div>
        
        <div class="badge">
            ✨ 已通过 Vercel + GitHub 自动部署 ✨
        </div>
        
        <div class="message">
            🚀 恭喜！你的静态页面已经成功部署到 Vercel<br>
            每次推送代码到 GitHub，都会自动触发部署更新
        </div>

        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">部署平台</div>
                <div class="info-value">Vercel</div>
            </div>
            <div class="info-item">
                <div class="info-label">代码仓库</div>
                <div class="info-value">GitHub</div>
            </div>
            <div class="info-item">
                <div class="info-label">部署时间</div>
                <div class="info-value" id="deployTime"></div>
            </div>
        </div>

        <button class="btn" onclick="showMessage()">
            🎯 点击测试交互
        </button>

        <div class="footer">
            <p>💡 提示：修改这个文件后，执行 git push，Vercel 会自动重新部署</p>
            <p style="margin-top: 0.5rem;">Made with ❤️ by Vercel + GitHub</p>
        </div>
    </div>

    <script>
        // 显示当前部署时间
        document.getElementById('deployTime').innerText = new Date().toLocaleString('zh-CN');

        // 添加粒子效果
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 8 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.animationDuration = Math.random() * 4 + 4 + 's';
                container.appendChild(particle);
            }
        }

        // 交互提示
        function showMessage() {
            alert('🎉 Vercel 自动部署测试成功！\n\n你的页面已经成功上线，每次 git push 都会自动更新。');
            
            // 添加一个简单的点击反馈效果
            const btn = document.querySelector('.btn');
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = '';
            }, 200);
        }

        // 页面加载动画
        window.addEventListener('load', () => {
            createParticles();
            console.log('✅ Vercel 部署成功！页面已加载');
        });

        // 添加控制台彩蛋
        console.log('%c🚀 Vercel + GitHub 自动部署成功！', 'color: #667eea; font-size: 16px; font-weight: bold;');
        console.log('%c每次 git push 都会自动触发部署更新', 'color: #764ba2; font-size: 14px;');
    </script>
</body>
</html>
